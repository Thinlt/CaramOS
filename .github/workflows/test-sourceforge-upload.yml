name: Test SourceForge Upload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sourceforge-upload-test:
    name: Upload small test file to SourceForge
    runs-on: ubuntu-24.04

    steps:
      - name: Validate SourceForge secrets
        env:
          SOURCEFORGE_USERNAME: ${{ secrets.SOURCEFORGE_USERNAME }}
          SOURCEFORGE_PROJECT: ${{ secrets.SOURCEFORGE_PROJECT }}
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
        run: |
          if [ -z "${SOURCEFORGE_USERNAME}" ] || [ -z "${SOURCEFORGE_PROJECT}" ] || [ -z "${SOURCEFORGE_SSH_KEY}" ]; then
            echo "::error::Missing SOURCEFORGE_USERNAME, SOURCEFORGE_PROJECT, or SOURCEFORGE_SSH_KEY secret."
            exit 1
          fi

      - name: Create test file
        run: |
          mkdir -p sourceforge-test
          cat > sourceforge-test/github-actions-upload-test.txt <<EOF
          CaramOS SourceForge upload test
          Repository: ${GITHUB_REPOSITORY}
          Run ID: ${GITHUB_RUN_ID}
          Commit: ${GITHUB_SHA}
          Created at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF
          sha256sum sourceforge-test/github-actions-upload-test.txt > sourceforge-test/SHA256SUMS
          ls -lah sourceforge-test

      - name: Upload test file to SourceForge
        env:
          SOURCEFORGE_USERNAME: ${{ secrets.SOURCEFORGE_USERNAME }}
          SOURCEFORGE_PROJECT: ${{ secrets.SOURCEFORGE_PROJECT }}
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SOURCEFORGE_SSH_KEY}" > ~/.ssh/sourceforge
          chmod 600 ~/.ssh/sourceforge
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts

          RELEASE_DIR="/home/frs/project/${SOURCEFORGE_PROJECT}/_upload-test/${GITHUB_RUN_ID}"
          cat > sourceforge-test/upload.sftp <<EOF
          mkdir /home/frs/project/${SOURCEFORGE_PROJECT}/_upload-test
          mkdir ${RELEASE_DIR}
          cd ${RELEASE_DIR}
          put sourceforge-test/github-actions-upload-test.txt
          put sourceforge-test/SHA256SUMS
          EOF

          sftp -i ~/.ssh/sourceforge \
            -o IdentitiesOnly=yes \
            -b sourceforge-test/upload.sftp \
            "${SOURCEFORGE_USERNAME}@frs.sourceforge.net"

          echo "Uploaded to: https://sourceforge.net/projects/${SOURCEFORGE_PROJECT}/files/_upload-test/${GITHUB_RUN_ID}/"
